baseURL = "https://moonyboat.github.io/"
title = "Moonyboat 的博客"
theme = "PaperMod"
languageCode = "zh-cn"
defaultContentLanguage = "zh-cn"

# 开启主页的文章分页功能 (每页显示数量)
paginate = 10

[params]
  # 博客作者
  author = "Moonyboat"
  # 开启暗黑/明亮模式切换功能 (auto会跟随系统)
  defaultTheme = "auto"
  disableThemeToggle = false

  # 主页 Profile 模式配置已迁移至 content/_index.md
  # [params.profileMode]
  #    enabled = true
  #    ...

  # 引入自定义 CSS
  customCSS = ["css/extended/custom.css"]

# 顶部导航菜单配置
[menu]
  [[menu.main]]
    identifier = "home"
    name = "Home"
    url = "/"
    weight = 10

  [[menu.main]]
    identifier = "notes"
    name = "Notes"
    url = "/notes/"
    weight = 20

  [[menu.main]]
    identifier = "daily"
    name = "Daily"
    url = "/daily/"
    weight = 30

  [[menu.main]]
    identifier = "projects"
    name = "Projects"
    url = "/projects/"
    weight = 40

  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 50
